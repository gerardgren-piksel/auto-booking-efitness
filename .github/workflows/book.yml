name: Book class

on:
  workflow_dispatch:
    inputs:
      booking_rules:
        description: "Każda linia: NAZWA | DZIEŃ | GODZINA"
        required: false
        default: ""
      days_ahead:
        description: "Ile dni do przodu"
        required: false
        default: "7"

    schedule:
       - cron: "5 23 * * *"
       - cron: "35 23 * * *"
       - cron: "5 0 * * *"
       - cron: "30 13 * * *"
    
      

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Prepare env
        run: |
          echo "BOOKING_RULES<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.inputs.booking_rules || vars.BOOKING_RULES }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "DAYS_AHEAD=${{ github.event.inputs.days_ahead || vars.DAYS_AHEAD || '7' }}" >> $GITHUB_ENV

      - name: Debug variables
        run: |
          echo "DAYS_AHEAD=$DAYS_AHEAD"
          echo "BOOKING_RULES<<EOF"
          echo "$BOOKING_RULES"
          echo "EOF"

      - name: Check syntax
        run: python -m py_compile book.py

      - name: Run booking
        run: python book.py
        env:
          EFITNESS_LOGIN: ${{ secrets.EFITNESS_LOGIN }}
          EFITNESS_PASSWORD: ${{ secrets.EFITNESS_PASSWORD }}
          BOOKING_RULES: ${{ env.BOOKING_RULES }}
          DAYS_AHEAD: ${{ env.DAYS_AHEAD }}

      - name: List files
        if: always()
        run: |
          pwd
          echo "--- ls root ---"
          ls -la
          echo "--- ls output ---"
          ls -la output || true
          echo "--- find repo files ---"
          find . -maxdepth 3 -type f | sort

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-debug
          path: output/**
          if-no-files-found: warn
          retention-days: 7
