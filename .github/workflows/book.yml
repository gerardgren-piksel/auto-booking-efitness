- name: Run booking
  run: python book.py
  env:
    EFITNESS_LOGIN: ${{ secrets.EFITNESS_LOGIN }}
    EFITNESS_PASSWORD: ${{ secrets.EFITNESS_PASSWORD }}
    TARGET_CLASS: KETTLEBELLS
    DAYS_AHEAD: 7

- name: Upload debug artifacts
  if: always()
  uses: actions/upload-artifact@v4
  with:
    name: booking-debug
    path: output/
    if-no-files-found: warn
    retention-days: 7
