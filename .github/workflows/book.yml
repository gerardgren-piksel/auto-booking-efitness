name: Book class

on:
  workflow_dispatch:
  pull_request:

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Run booking
        run: python book.py
        env:
          EFITNESS_LOGIN: ${{ secrets.EFITNESS_LOGIN }}
          EFITNESS_PASSWORD: ${{ secrets.EFITNESS_PASSWORD }}
          TARGET_CLASS: KETTLEBELLS
          DAYS_AHEAD: 7

      - name: List files
        if: always()
        run: |
          pwd
          echo "--- ls root ---"
          ls -la
          echo "--- ls output ---"
          ls -la output || true
          echo "--- find repo files ---"
          find . -maxdepth 3 -type f | sort

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-debug
          path: output/**
          if-no-files-found: warn
          retention-days: 7
